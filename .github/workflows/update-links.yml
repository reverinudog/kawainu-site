name: Update Links Data

on:
  schedule:
    # 3時間ごとに実行 (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch latest links data
        run: python tools/update-links.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/links.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/links.json
          git commit -m "auto: update links data"
          git push
