<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>お祓いシミュレーター</title>
  <meta name="description" content="3D物理演出で100面ダイスを100個転がすシミュレーター">
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2286415100906814"
    crossorigin="anonymous"></script>
</head>

<body>
  <a href="../../" id="back-to-site">← サイトに戻る</a>
  <div id="app">
    <!-- 3D Canvas -->
    <canvas id="dice-canvas"></canvas>

    <!-- Overlay UI -->
    <div id="overlay">
      <h1 id="title">お祓いシミュレーター</h1>
      <p id="subtitle">100面ダイスを100個ふってお祓いをしよう！</p>
      <div id="btn-row">
        <button id="roll-btn">🎲 転がす</button>
        <div id="action-btns">
          <button id="screenshot-btn" class="action-btn">📸 スクショ</button>
          <button id="share-btn" class="action-btn">𝕏 共有</button>
        </div>
      </div>
      <div id="status-text"></div>
    </div>

    <!-- Results Panel -->
    <div id="results-panel">
      <div id="results-grid"></div>
    </div>

    <!-- Debug Panel (?debug=1 で表示) -->
    <div id="debug-panel" style="display:none">
      <div id="debug-title">DEBUG</div>
      <button class="debug-btn" id="debug-normal">通常</button>
      <button class="debug-btn" id="debug-crit">クリ多め</button>
      <button class="debug-btn" id="debug-fumble">ファン多め</button>
      <button class="debug-btn" id="debug-neutral">同数</button>
      <button class="debug-btn" id="debug-explosion">爆発</button>
      <button class="debug-btn" id="debug-fallen">落下</button>
    </div>

    <!-- インタースティシャル広告オーバーレイ -->
    <div id="ad-interstitial" class="ad-interstitial-overlay">
      <div class="ad-interstitial-backdrop"></div>
      <div class="ad-interstitial-content">
        <button id="ad-interstitial-close" class="ad-interstitial-close" aria-label="閉じる">✕</button>
        <div class="ad-interstitial-label">広告</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2286415100906814" data-ad-slot="ZZZZZZZZZ"
          data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
    </div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.162.0",
      "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/",
      "cannon-es": "https://esm.sh/cannon-es@0.20.0"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
